<?xml version="1.0"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" 
     xmlns:xlink="http://www.w3.org/1999/xlink" 
     width="4in" height="4in" 
     viewBox="0 0 1000 1000" 
     preserveAspectRatio="xMidYMid">

    <defs>
        <g id="Tridecagon">
            <g>
                <polygon points="160.00, 80.00, 150.64, 116.32, 125.13, 143.26, 89.10, 158.85, 50.81, 155.19,  
                                19.46, 131.54, 4.19, 94.94, 4.19, 65.06, 19.46, 28.46, 50.81, 4.81, 89.10, 1.15, 125.13, 16.74, 150.64, 43.68" 
                         style="stroke:black; stroke-width:3" />
                <animateTransform 
                    attributeName="transform" 
                    attributeType="XML" 
                    type="rotate" 
                    from="0 82 80" 
                    to="360 82 80" 
                    dur="3s" 
                    repeatCount="indefinite" />
            </g>
        </g>

        <g id="Mechanism">
            <polygon points="150,400 250,400 200,100" />
            
            <g transform="rotate(15, 200, 100)">
                <line x1="50" y1="100" x2="350" y2="100" stroke="red" stroke-width="20" />
                
                <use xlink:href="#Tridecagon" x="-82" y="-80" transform="translate(50, 100) scale(0.5)" />
                
                <use xlink:href="#Tridecagon" x="-82" y="-80" transform="translate(350, 100) scale(0.5)" />
            </g>
        </g>
    </defs>

    <rect width="1000" height="1000" fill="white" />

    <use xlink:href="#Mechanism" transform="translate(50, 100) scale(1.2)" fill="purple" />
    <use xlink:href="#Mechanism" transform="translate(600, 100) scale(0.8)" fill="green" />
    <use xlink:href="#Mechanism" transform="translate(350, 500) scale(1.3)" fill="blue" />

</svg>
