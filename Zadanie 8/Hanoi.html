<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8">
	<title>Wieża Hanoi - three.js</title>
	<style>
		body {
			margin: 0;
			overflow: hidden;
			background: #202020;
		}
	</style>
</head>
<body>
	<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

	<script>
		const scene = new THREE.Scene();

		const camera = new THREE.PerspectiveCamera(
			60, window.innerWidth / window.innerHeight, 0.1, 1000
		);
		camera.position.set(0, 6, 12);
		camera.lookAt(0, 0, 0);

		const renderer = new THREE.WebGLRenderer({ antialias: true });
		renderer.setSize(window.innerWidth, window.innerHeight);
		document.body.appendChild(renderer.domElement);
		const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
		scene.add(ambientLight);

		const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
		directionalLight.position.set(5, 10, 7);
		scene.add(directionalLight);

		const fillLight = new THREE.PointLight(0xffffff, 0.6);
		fillLight.position.set(0, 5, 8);
		scene.add(fillLight);
		const base = new THREE.Mesh(
			new THREE.BoxGeometry(14, 0.5, 4),
			new THREE.MeshPhongMaterial({ color: 0x8b5a2b })
		);
		base.position.y = -0.25;
		scene.add(base);
		const pegPositions = [-4, 0, 4];
		const stacks = [[], [], []];
		let disks = [];
		let moveIndex = 0;

		pegPositions.forEach(x => {
			const peg = new THREE.Mesh(
				new THREE.CylinderGeometry(0.1, 0.1, 4),
				new THREE.MeshPhongMaterial({ color: 0xffffff })
			);
			peg.position.set(x, 2, 0);
			scene.add(peg);
		});
		const diskHeight = 0.5;
		const diskCount = 4;
		function createDisks() {
			for (let i = 0; i < diskCount; i++) {
				const geometry = new THREE.CylinderGeometry(
					2 - i * 0.3,
					2 - i * 0.3,
					diskHeight,
					32
				);

				const material = new THREE.MeshPhongMaterial({
					color: new THREE.Color(`hsl(${i * 60}, 70%, 50%)`)
				});

				const disk = new THREE.Mesh(geometry, material);

				disk.position.set(
					pegPositions[0],
					diskHeight / 2 + i * diskHeight,
					0
				);

				scene.add(disk);
				stacks[0].push(disk);
				disks.push(disk);
			}
		}
		function hanoi(n, from, to, aux, moves = []) {
			if (n === 1) {
				moves.push([from, to]);
			} else {
				hanoi(n - 1, from, aux, to, moves);
				moves.push([from, to]);
				hanoi(n - 1, aux, to, from, moves);
			}
			return moves;
		}

		const moves = hanoi(diskCount, 0, 2, 1);
		const speed = 0.08;

		function animateMove(move, onComplete) {
			const [from, to] = move;
			const disk = stacks[from].pop();
			stacks[to].push(disk);

			const targetX = pegPositions[to];
			const targetY = diskHeight / 2 + (stacks[to].length - 1) * diskHeight;

			let phase = 0;

			function step() {
				if (phase === 0) {
					if (disk.position.y < 5) {
						disk.position.y += speed;
					} else phase = 1;
				}
				else if (phase === 1) {
					if (Math.abs(disk.position.x - targetX) > 0.05) {
						disk.position.x += (targetX - disk.position.x) * speed;
					} else phase = 2;
				}
				else if (phase === 2) {
					if (disk.position.y > targetY) {
						disk.position.y -= speed;
					} else {
						onComplete();
						return;
					}
				}

				requestAnimationFrame(step);
			}

			step();
		}
		function playMoves() {
			if (moveIndex >= moves.length) return;

			animateMove(moves[moveIndex], () => {
				moveIndex++;
				setTimeout(playMoves, 200);
			});
		}
		createDisks();
		setTimeout(playMoves, 1000);;
		function render() {
			requestAnimationFrame(render);
			renderer.render(scene, camera);
		}
		render();
		window.addEventListener('resize', () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		});
	</script>

</body>
</html>
