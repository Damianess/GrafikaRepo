<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subroutine Hierarchy </title>

<script>
    var canvas;    
    var graphics; 
    var X_LEFT = -4;    
    var X_RIGHT = 4;
    var Y_BOTTOM = -3;
    var Y_TOP = 3;
    var BACKGROUND = "white";  
    var pixelSize;  
    var frameNumber = 0;  


    function drawWorld() {

        graphics.save();
        graphics.translate(-2.5, 1.5); 
        drawMechanism("purple", "green", 1.0, 2.2);
        graphics.restore();

        graphics.save();
        graphics.translate(2, 1.5);
        graphics.scale(0.7, 0.7); 
        drawMechanism("green", "yellow", 0.8, 1.8);
        graphics.restore();

        graphics.save();
        graphics.translate(0, -1);
        graphics.scale(1.2, 1.2);
        drawMechanism("blue", "black", 1.3, 2.6);
        graphics.restore();
    }

 
    function drawMechanism(baseColor, wheelColor, baseHeight, beamWidth) {

        graphics.save();
        graphics.fillStyle = baseColor;
        graphics.translate(0, -baseHeight);
        graphics.scale(0.6, baseHeight);
        filledTriangle(graphics);
        graphics.restore();

        graphics.save();
        graphics.rotate(-15 * Math.PI / 180); 

        graphics.save();
        graphics.fillStyle = "red";
        graphics.scale(beamWidth, 0.15);
        filledRect();
        graphics.restore();

        graphics.save();
        graphics.translate(-beamWidth / 2, 0);
        rotatingWheel(wheelColor);
        graphics.restore();


        graphics.save();
        graphics.translate(beamWidth / 2, 0);
        rotatingWheel(wheelColor);
        graphics.restore();

        graphics.restore();
    }

    function rotatingWheel(color) {
        graphics.save();
        graphics.fillStyle = color;
        graphics.rotate((frameNumber * 1.5) * Math.PI / 180);
        graphics.scale(0.5, 0.5);
        
        var vertices = 13;
        graphics.beginPath();
        for (var i = 0; i <= vertices; i++) {
            var angle = (i * 2 * Math.PI) / vertices;
            var x = Math.cos(angle);
            var y = Math.sin(angle);
            if (i == 0) graphics.moveTo(x, y);
            else graphics.lineTo(x, y);
        }
        graphics.closePath();
        graphics.fill();   
        graphics.stroke(); 
        graphics.restore();
    }

    function updateFrame() {
        frameNumber++;
    }

    //------------------- Metody kształtów podstawowych ----------------
    
    function filledRect() {
        graphics.fillRect(-0.5, -0.5, 1, 1);
    }

    function filledTriangle(g2) {
        g2.beginPath();
        g2.moveTo(-0.5, 0);
        g2.lineTo(0.5, 0);
        g2.lineTo(0, 1);
        g2.closePath();
        g2.fill();
    }

    // ------------------------------- Wsparcie grafiki --------------------------
    
    function draw() {
        graphics.save();
        graphics.fillStyle = BACKGROUND;
        graphics.fillRect(0, 0, canvas.width, canvas.height);
        graphics.fillStyle = "black";
        applyLimits(graphics, X_LEFT, X_RIGHT, Y_TOP, Y_BOTTOM, false);
        graphics.lineWidth = pixelSize;
        drawWorld();
        graphics.restore();
    }
    
    function applyLimits(g, xleft, xright, ytop, ybottom, preserveAspect) {
       var width = canvas.width;
       var height = canvas.height;
       if (preserveAspect) {
          var displayAspect = Math.abs(height / width);
          var requestedAspect = Math.abs(( ybottom-ytop ) / ( xright-xleft ));
          var excess;
          if (displayAspect > requestedAspect) {
             excess = (ybottom-ytop) * (displayAspect/requestedAspect - 1);
             ybottom += excess/2; ytop -= excess/2;
          }
          else if (displayAspect < requestedAspect) {
             excess = (xright-xleft) * (requestedAspect/displayAspect - 1);
             xright += excess/2; xleft -= excess/2;
          }
       }
       var pixelWidth = Math.abs(( xright - xleft ) / width);
       var pixelHeight = Math.abs(( ybottom - ytop ) / height);
       pixelSize = Math.min(pixelWidth, pixelHeight);
       g.scale( width / (xright-xleft), height / (ybottom-ytop) );
       g.translate( -xleft, -ytop );
    }
    
    var running = false;
    function frame() {
        if (running) {
            updateFrame();
            draw();
            requestAnimationFrame(frame);
        }
    }
    
    function doAnimationCheckbox() { 
        var shouldRun = document.getElementById("animateCheck").checked;
        if (shouldRun != running) {
            running = shouldRun;
            if (running) requestAnimationFrame(frame);
        }
    }

    function init() {
        canvas = document.getElementById("thecanvas");
        graphics = canvas.getContext("2d");
        document.getElementById("animateCheck").checked = false; 
        document.getElementById("animateCheck").onchange = doAnimationCheckbox; 
        draw();
    }
</script>
</head>
<body onload="init()" style="background-color:#EEEEEE">
<h3>Subroutine Hierarchy </h3>
<p id="message"><label><input type="checkbox" id="animateCheck"><b>Run the Animation</b></label></p>
<div style="float:left; border: 2px solid black">
<canvas id="thecanvas" width="800" height="600" style="display:block"></canvas>
</div>
</body>
</html>
